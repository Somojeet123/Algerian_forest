<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Forest Fire Risk Prediction</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
width:900px;
display:grid;
grid-template-columns:1.2fr 1fr;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
overflow:hidden;
}

.left{
padding:40px;
}

.title{
font-size:24px;
font-weight:bold;
margin-bottom:10px;
}

.subtitle{
color:#666;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
margin-bottom:5px;
font-size:13px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

button{
grid-column:span 2;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1e40af;
}

.right{
background:#111827;
color:white;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
padding:30px;
}

.result{
font-size:36px;
font-weight:bold;
color:#22c55e;
}

</style>

</head>

<body>

<div class="container">

<div class="left">

<div class="title">Forest Fire Risk Prediction</div>
<div class="subtitle">Machine Learning Model (Ridge Regression)</div>

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>Region</label>
<select name="Region">
<option value="0">Bejaia</option>
<option value="1">Sidi-Bel Abbes</option>
</select>
</div>

<div class="form-group">
<label>Temperature</label>
<input type="number" step="any" name="Temperature" required>
</div>

<div class="form-group">
<label>Relative Humidity</label>
<input type="number" step="any" name="RH" required>
</div>

<div class="form-group">
<label>Wind Speed</label>
<input type="number" step="any" name="Ws" required>
</div>

<div class="form-group">
<label>Rain</label>
<input type="number" step="any" name="Rain" required>
</div>

<div class="form-group">
<label>FFMC</label>
<input type="number" step="any" name="FFMC" required>
</div>

<div class="form-group">
<label>DMC</label>
<input type="number" step="any" name="DMC" required>
</div>

<div class="form-group">
<label>ISI</label>
<input type="number" step="any" name="ISI" required>
</div>

<div class="form-group">
<label>Fire Class</label>
<select name="Classes">
<option value="0">No Fire</option>
<option value="1">Fire</option>
</select>
</div>

<button type="submit">Run Prediction</button>

</div>

</form>

</div>

<div class="right">

{% if prediction is not none %}

<h3>Predicted Fire Weather Index</h3>

<div class="result">
{{ prediction }}
</div>

{% else %}

<p>Enter parameters and run prediction</p>

{% endif %}

</div>

</div>

</body>
</html>
