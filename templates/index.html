<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Forest Fire Risk Prediction</title>

<style>

*{
box-sizing:border-box;
font-family:"Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
}

body{
margin:0;
background:#f4f6f9;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.app-container{
width:900px;
background:white;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.08);
display:grid;
grid-template-columns:1.2fr 1fr;
overflow:hidden;
}

.left-panel{
padding:40px;
}

.title{
font-size:24px;
font-weight:600;
margin-bottom:10px;
}

.subtitle{
font-size:14px;
color:#6b7280;
margin-bottom:25px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.form-group{
display:flex;
flex-direction:column;
}

label{
font-size:13px;
margin-bottom:5px;
}

input,select{
padding:10px;
border-radius:6px;
border:1px solid #d1d5db;
}

button{
margin-top:20px;
padding:12px;
width:100%;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-weight:600;
cursor:pointer;
}

.right-panel{
background:#0f172a;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:40px;
}

.result-title{
font-size:18px;
margin-bottom:10px;
}

.result-value{
font-size:36px;
font-weight:700;
color:#22c55e;
}

</style>

</head>

<body>

<div class="app-container">

<div class="left-panel">

<div class="title">Forest Fire Risk Prediction</div>
<div class="subtitle">Machine Learning Model (Ridge Regression)</div>

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>Region</label>
<select name="Region">
<option value="0">Bejaia</option>
<option value="1">Sidi Bel-Abbes</option>
</select>
</div>

<div class="form-group">
<label>Temperature</label>
<input type="number" step="any" name="Temperature"
value="{{ form_data.get('Temperature','') }}" required>
</div>

<div class="form-group">
<label>Relative Humidity</label>
<input type="number" step="any" name="RH"
value="{{ form_data.get('RH','') }}" required>
</div>

<div class="form-group">
<label>Wind Speed</label>
<input type="number" step="any" name="Ws"
value="{{ form_data.get('Ws','') }}" required>
</div>

<div class="form-group">
<label>Rain</label>
<input type="number" step="any" name="Rain"
value="{{ form_data.get('Rain','') }}" required>
</div>

<div class="form-group">
<label>FFMC</label>
<input type="number" step="any" name="FFMC"
value="{{ form_data.get('FFMC','') }}" required>
</div>

<div class="form-group">
<label>DMC</label>
<input type="number" step="any" name="DMC"
value="{{ form_data.get('DMC','') }}" required>
</div>

<div class="form-group">
<label>ISI</label>
<input type="number" step="any" name="ISI"
value="{{ form_data.get('ISI','') }}" required>
</div>

<div class="form-group">
<label>Fire Class</label>
<select name="Classes">
<option value="0">No Fire</option>
<option value="1">Fire</option>
</select>
</div>

</div>

<button type="submit">Run Prediction</button>

</form>

</div>

<div class="right-panel">

{% if prediction %}
<div class="result-title">Predicted Fire Weather Index</div>
<div class="result-value">{{ prediction }}</div>
{% else %}
<div>Enter values and run prediction</div>
{% endif %}

</div>

</div>

</body>

</html>
